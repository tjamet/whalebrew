name: Go CI
on: 
  push:
    branches:
    - "**"
    tags:
    - "**"
  pull_request:

jobs:

  build:
    strategy:
      matrix:
        os: 
        - ubuntu-latest
        #- macos-latest
        go-version: [1.12]
    name: Build
    runs-on: ${{ matrix.os }}
    steps:
    - name: hello world
      run: echo hello world

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v2
      with:
        go-version: ${{ matrix.go-version }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2
      with:
        # https://github.com/actions/checkout#fetch-all-history-for-all-tags-and-branches
        # fetch all tags
        fetch-depth: 0    

    - name: Build
      run: |
        go build -v -ldflags "-X github.com/whalebrew/whalebrew/version.Version=$(git describe --always --tags --dirty)" -o whalebrew-$(uname -s)-$(uname -m) .
        sha256sum whalebrew-$(uname -s)-$(uname -m) | awk '{print $1}' > whalebrew-$(uname -s)-$(uname -m).sha256
        md5sum whalebrew-$(uname -s)-$(uname -m) | awk '{print $1}' > whalebrew-$(uname -s)-$(uname -m).md5
    
    - name: Ensure binary works
      run: ./whalebrew-$(uname -s)-$(uname -m) version

    - uses: actions/upload-artifact@v2
      with:
        name: whalebrew-${{ matrix.os }}
        path: whalebrew-*

    # - name: run tests
    #   run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    # - uses: codecov/codecov-action@v1
    #   with:
    #     token: ${{ secrets.CODECOV_TOKEN }} #required
    
  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags') }}
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Compute release date
      id: release_date
      run: |
        echo "::set-output name=date::"$(date +%Y-%m-%d)
        echo $(date +%Y-%m-%d)
    - name: bla
      run: echo "${{ toJson(needs) }}"
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}-${{ steps.release_date.outputs.date }}
        body: |
          Changes in this Release
          - First Change
          - Second Change
      
  attach-release-assets:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        os: 
        - ubuntu-latest
        #- macos-latest
    steps:
    - name: Download assets
      uses: actions/download-artifact@v2
      with:
        name: whalebrew-${{ matrix.os }}
    - name: bla
      run: echo "${{ toJson(needs) }}"
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.release.outputs.upload_url }}
        asset_path: whalebrew-${{ matrix.os }}
        asset_name: whalebrew-${{ matrix.os }}
        asset_content_type: application/octet-stream