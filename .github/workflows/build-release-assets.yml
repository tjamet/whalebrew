name: Build release assets
on: 
  release:
    types: [created, edited, prereleased]

jobs:
  update-readme:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: [1.12]
    name: Update Readme
    runs-on: ${{ matrix.os }}
    steps:

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v1
      with:
        go-version: ${{ matrix.go-version }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2-beta

    - name: Get dependencies
      run: go mod download

    - name: Build
      id: build
      run: |
        echo ::set-output name=artifact_name::whalebrew-$(uname -s)-$(uname -m)
        go build -o whalebrew-$(uname -s)-$(uname -m)

    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: ./${{ steps.build.outputs.artifact_name }}
        asset_name: ${{ steps.build.outputs.artifact_name }}
        asset_content_type: application/octet-stream
