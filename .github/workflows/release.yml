name: Update release assets
on: 
  release:
    types: [published]

jobs:
  build_assets:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: [1.12]
    name: Build assets
    runs-on: ${{ matrix.os }}
    steps:

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v1
      with:
        go-version: ${{ matrix.go-version }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2-beta

    - name: Get dependencies
      run: go mod download

    - name: Build
      id: build
      run: |
        echo ::set-output name=artifact_name::whalebrew-$(uname -s)-$(uname -m)
        go build -o whalebrew-$(uname -s)-$(uname -m)

    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: ./${{ steps.build.outputs.artifact_name }}
        asset_name: ${{ steps.build.outputs.artifact_name }}
        asset_content_type: application/octet-stream


  update_readme:
    needs:
    - build_assets
    name: Update Readme
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2-beta

    - name: Update Readme
      run: sed -i 's,https://github.com/.*/releases/download/.*/whalebrew-,https://github.com/whalebrew/whalebrew/releases/download/${{ github.event.release.name }}/whalebrew-,' README.md

    - name: Publish readme
      run: |
        git add README.md
        git config --global user.name "whalebrew-bot"
        git config --global user.email "whalebrew@users.noreply.github.com"
        git commit -m '[Auto] update download URL'
        git remote -vvv
        git config --global credential.helper store
        git push origin HEAD:refs/heads/master